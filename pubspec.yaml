name: flclashx
description: A multi-platform proxy client based on ClashMeta.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.5
  package_info_plus: ^8.1.3
  url_launcher: ^6.3.1
  connectivity_plus: ^7.0.0
  permission_handler: ^11.3.1
  window_manager: ^0.4.3
  tray_manager: ^0.2.3
  launch_at_startup: ^0.5.1
  hotkey_manager: ^0.2.3
  app_links: ^6.4.0
  flutter_animate: ^4.5.2
  flutter_svg: ^2.2.3
  cached_network_image: ^3.4.1
  provider: ^6.1.2
  http: ^1.2.2
  dio: ^5.9.0
  uuid: ^4.5.1
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28
  path: ^1.9.1
  ffi: ^2.1.5
  lpinyin: ^2.0.3
  archive: ^4.0.7
  crypto: ^3.0.7
  device_info_plus: ^12.3.0
  screen_retriever: ^0.2.0
  defer_pointer: ^0.0.2
  re_highlight: ^0.0.3
  emoji_regex: ^0.0.5
  uni_platform: ^0.1.3
  webdav_client: ^1.2.2
  image_picker: ^1.2.1
  win32: ^5.15.0
  pretty_qr_code: ^3.3.0
  flutter_cache_manager: ^3.4.1
  animations: ^2.0.11
  dynamic_color: ^1.7.0
  file_picker: ^8.1.7
  mobile_scanner: ^5.2.3
  network_info_plus: ^6.1.1
  qr_flutter: ^4.1.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  proxy:
    git:
      url: https://github.com/chen08209/proxy.git
      ref: main
  window_ext:
    git:
      url: https://github.com/chen08209/window_ext.git
      ref: main
  re_editor:
    git:
      url: https://github.com/chen08209/re-editor.git
      ref: main
  flutter_js:
    git:
      url: https://github.com/chen08209/flutter_js
      ref: master

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  drift_dev: ^2.23.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/icon_black.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/images/icon_black.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/data/
    - assets/fonts/
    - assets/images/
    - assets/images/avatars/
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
    - family: Twemoji
      fonts:
        - asset: assets/fonts/Twemoji.Mozilla.ttf
    - family: Icons
      fonts:
        - asset: assets/fonts/Icons.ttf
    - family: Unbounded
      fonts:
        - asset: assets/fonts/Unbounded-Regular.ttf
