name: fl_clash
description: A multi-platform proxy client based on ClashMeta.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.5
  package_info_plus: ^8.1.3
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.4
  permission_handler: ^11.3.1
  local_auth: ^2.3.0
  window_manager: ^0.4.3
  tray_manager: ^0.2.3
  launch_at_startup: ^0.3.2
  hotkey_manager: ^0.2.3
  app_links: ^6.4.0
  flutter_animate: ^4.5.2
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  fl_chart: ^0.70.2
  provider: ^6.1.2
  http: ^1.2.2
  uuid: ^4.5.1
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28
  path: ^1.9.1
  ffi: ^2.1.4
  lpinyin: ^2.0.11
  pretty_qr_code: ^3.3.0
  qr_code_scanner_plus: ^2.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.1
  drift_dev: ^2.23.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/icon_black.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/images/icon_black.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/data/
