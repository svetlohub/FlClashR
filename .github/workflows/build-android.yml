name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Configure git — use HTTPS instead of SSH
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27.0.12077973
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"
          echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973"    >> $GITHUB_ENV

      - name: Setup Flutter 3.32.8
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.32.8'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: |
          dart run flutter_launcher_icons
          echo "=== Generated ic_launcher files ==="
          find android/app/src/main/res -name "ic_launcher*" | sort

      - name: Build native Clash core (Go → .so)
        run: dart setup.dart android --out core
        env:
          ANDROID_NDK: ${{ env.ANDROID_NDK }}

      - name: Generate Dart code (freezed / riverpod / drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (arm64, release)
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlClashR-arm64-release
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 14
